<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau Intelligence Hub — Häcker Küchen</title>
  <link rel="icon" href="https://www.haecker-kuechen.com/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>

  <!-- ==================== LOGIN SCREEN ==================== -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-card">
      <div class="login-logo">
        <img
          src="https://www.haecker-kuechen.com/_assets/0461cac7cf841c14e085cd32e5c0799e/images/logo_white.svg"
          alt="Häcker Küchen"
          class="login-logo-img"
          onerror="this.style.display='none'; document.getElementById('login-logo-fallback').style.display='flex';"
        >
        <div class="login-logo-fallback" id="login-logo-fallback" style="display:none">HK</div>
      </div>
      <h1 class="login-title">Intelligence Hub</h1>
      <p class="login-subtitle">Bitte anmelden, um fortzufahren</p>

      <div class="login-error" id="login-error" style="display:none"></div>

      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label class="login-label" for="login-email">E-Mail</label>
          <input class="login-input" type="email" id="login-email" placeholder="name@haecker-kuechen.com" required autocomplete="email">
        </div>
        <div class="login-field">
          <label class="login-label" for="login-password">Passwort</label>
          <input class="login-input" type="password" id="login-password" placeholder="Passwort eingeben" required autocomplete="current-password">
        </div>
        <button class="login-btn" type="submit" id="login-submit">
          <span id="login-btn-text">Anmelden</span>
          <span id="login-btn-spinner" class="login-spinner" style="display:none"></span>
        </button>
      </form>

      <div class="login-toggle">
        <span id="login-toggle-text">Noch kein Konto?</span>
        <button class="login-toggle-btn" id="login-toggle-btn" type="button">Registrieren</button>
      </div>
    </div>
  </div>

  <!-- ==================== APP LOADING ==================== -->
  <div class="app-loading" id="app-loading" style="display:none">
    <div class="app-loading-spinner"></div>
    <div class="app-loading-text">Daten werden geladen…</div>
  </div>

  <!-- ==================== SIDEBAR ==================== -->
  <aside id="sidebar" class="sidebar" style="display:none">
    <div class="sidebar-logo">
      <img
        src="https://www.haecker-kuechen.com/_assets/0461cac7cf841c14e085cd32e5c0799e/images/logo_white.svg"
        alt="Häcker Küchen"
        class="sidebar-logo-img"
        id="sidebar-logo-img"
      >
      <img
        src="https://www.haecker-kuechen.com/_assets/0461cac7cf841c14e085cd32e5c0799e/images/logo_black.svg"
        alt="Häcker Küchen"
        class="sidebar-logo-img-dark"
        id="sidebar-logo-img-dark"
      >
      <div class="sidebar-logo-fallback" id="sidebar-logo-fallback">HK</div>
      <span class="sidebar-logo-text">Intelligence Hub</span>
    </div>

    <nav class="sidebar-nav">
      <ul class="sidebar-menu">
        <li>
          <a href="#dashboard" class="sidebar-link active" data-view="dashboard">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span class="sidebar-label">Dashboard</span>
          </a>
        </li>
        <li>
          <a href="#reports" class="sidebar-link" data-view="reports">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span class="sidebar-label">Auswertungen</span>
          </a>
        </li>
        <li>
          <a href="#users" class="sidebar-link" data-view="users">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span class="sidebar-label">Nutzer</span>
          </a>
        </li>
        <li>
          <a href="#datasources" class="sidebar-link" data-view="datasources">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            <span class="sidebar-label">Datenquellen</span>
          </a>
        </li>
        <li>
          <a href="#categories" class="sidebar-link" data-view="categories">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span class="sidebar-label">Kategorien</span>
          </a>
        </li>
        <li>
          <a href="#rollout" class="sidebar-link" data-view="rollout">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/></svg>
            <span class="sidebar-label">Rollout</span>
          </a>
        </li>
        <li>
          <a href="#consolidation" class="sidebar-link" data-view="consolidation">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span class="sidebar-label">Konsolidierung</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user-info" id="sidebar-user-info">
        <div class="sidebar-user-avatar" id="sidebar-user-avatar"></div>
        <span class="sidebar-user-email" id="sidebar-user-email"></span>
        <button class="sidebar-logout-btn" id="sidebar-logout-btn" type="button" title="Abmelden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
      <div class="sidebar-progress" id="sidebar-progress">
        <span class="sidebar-progress-text" id="sidebar-progress-text">0 / 30</span>
      </div>
      <div class="theme-switcher" id="theme-switcher">
        <button class="theme-btn" data-theme="light" type="button" title="Hell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="theme-btn active" data-theme="dark" type="button" title="Dunkel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="theme-btn" data-theme="beige" type="button" title="Beige">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
        </button>
      </div>
      <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" type="button" aria-label="Sidebar ein-/ausklappen">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
  </aside>

  <!-- ==================== MAIN CONTENT ==================== -->
  <div class="main-wrapper" id="main-wrapper" style="display:none">

    <!-- NAVBAR -->
    <header class="navbar">
      <div class="navbar-left">
        <button class="navbar-menu-btn" id="navbar-menu-btn" type="button" aria-label="Menü">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 class="navbar-title" id="navbar-title">Dashboard</h2>
      </div>
      <div class="navbar-right">
        <button class="navbar-search-btn" id="navbar-search-btn" type="button" aria-label="Suche">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span class="navbar-search-hint">&#8984;K</span>
        </button>
        <button class="btn btn-primary" id="btn-new-report" type="button">+ Neue Auswertung</button>
      </div>
    </header>

    <!-- VIEW: DASHBOARD -->
    <section id="view-dashboard" class="view view-active">
      <div class="view-inner" id="dashboard-content"></div>
    </section>

    <!-- VIEW: REPORTS -->
    <section id="view-reports" class="view">
      <div class="view-inner" id="reports-content"></div>
    </section>

    <!-- VIEW: USERS -->
    <section id="view-users" class="view">
      <div class="view-inner" id="users-content"></div>
    </section>

    <!-- VIEW: DATASOURCES -->
    <section id="view-datasources" class="view">
      <div class="view-inner" id="datasources-content"></div>
    </section>

    <!-- VIEW: CATEGORIES -->
    <section id="view-categories" class="view">
      <div class="view-inner" id="categories-content"></div>
    </section>

    <!-- VIEW: ROLLOUT -->
    <section id="view-rollout" class="view">
      <div class="view-inner" id="rollout-content"></div>
    </section>

    <!-- VIEW: CONSOLIDATION -->
    <section id="view-consolidation" class="view">
      <div class="view-inner" id="consolidation-content"></div>
    </section>

  </div>

  <!-- ==================== MODAL OVERLAY ==================== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-container" id="modal-container"></div>
  </div>

  <!-- ==================== SPOTLIGHT (CMD+K) ==================== -->
  <div class="spotlight-overlay" id="spotlight-overlay">
    <div class="spotlight-container">
      <div class="spotlight-input-wrap">
        <svg class="spotlight-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="spotlight-input" id="spotlight-input" placeholder="Suche in Auswertungen, Datenquellen, Nutzern…" autocomplete="off">
        <kbd class="spotlight-esc">ESC</kbd>
      </div>
      <div class="spotlight-results" id="spotlight-results"></div>
    </div>
  </div>

  <!-- ==================== TOAST CONTAINER ==================== -->
  <div class="toast-container" id="toast-container"></div>

</body>
</html>
